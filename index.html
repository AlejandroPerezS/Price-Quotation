<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Price Quote</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1e2530;
      --border:   #2a3240;
      --accent:   #1e90ff;
      --accent2:  #00d4aa;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --danger:   #ff6b6b;
      --gold:     #f0b429;
      --radius:   12px;
      --shadow:   0 8px 32px rgba(0,0,0,0.4);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      background-image:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(30,144,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 90%, rgba(0,212,170,0.06) 0%, transparent 60%);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    .header p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
      font-weight: 300;
    }

    /* ── Search Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow);
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 140px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input[type="text"] {
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(30,144,255,0.15);
    }

    .btn-search {
      margin-top: 18px;
      width: 100%;
      padding: 13px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #1570c9);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.02em;
    }
    .btn-search:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-search:active { transform: translateY(0); }
    .btn-search:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status messages ── */
    .status-msg {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      color: var(--muted);
    }
    .status-msg.error { color: var(--danger); }

    /* ── Results section ── */
    .results-section {
      width: 100%;
      max-width: 960px;
      margin-top: 36px;
      display: none;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .results-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .results-count {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    thead th {
      padding: 13px 18px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    thead th:last-child { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.18s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(30,144,255,0.06); }
    tbody tr.selected {
      background: rgba(30,144,255,0.12);
      outline: 1px solid rgba(30,144,255,0.3);
      outline-offset: -1px;
    }

    td {
      padding: 14px 18px;
      vertical-align: middle;
      font-size: 14px;
    }

    /* thumbnail */
    .thumb-cell { width: 68px; padding: 10px 14px; }
    .thumb-wrap {
      width: 52px; height: 52px;
      background: var(--surface2);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .thumb-fallback {
      font-size: 22px;
      color: var(--muted);
    }

    .product-name {
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .product-brand {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .price-cell {
      text-align: right;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--accent2);
      white-space: nowrap;
    }
    .price-cell .price-null {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
    }

    /* stars */
    .stars { color: var(--gold); font-size: 12px; letter-spacing: 1px; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeBg 0.25s ease;
    }
    @keyframes fadeBg { from { opacity: 0; } to { opacity: 1; } }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      overflow: hidden;
      animation: scaleIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover { background: var(--border); color: var(--text); }

    .modal-body {
      padding: 24px 24px 28px;
      display: flex;
      gap: 20px;
    }

    .modal-img-wrap {
      width: 110px; height: 110px;
      flex-shrink: 0;
      background: var(--surface2);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--muted);
    }
    .modal-img-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    .modal-info { flex: 1; min-width: 0; }
    .modal-product-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
    }
    .detail-item { display: flex; flex-direction: column; gap: 2px; }
    .detail-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .detail-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .detail-value.price-highlight {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent2);
    }
    .detail-value.sponsored-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--gold);
    }

    .modal-delivery {
      margin-top: 14px;
      padding: 12px 14px;
      background: var(--surface2);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .modal-delivery .detail-label { margin-bottom: 6px; display: block; }
    .modal-delivery ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .modal-delivery li {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .modal-delivery li::before {
      content: '→';
      color: var(--accent2);
      flex-shrink: 0;
      font-size: 11px;
      margin-top: 1px;
    }

    .modal-footer {
      padding: 0 24px 24px;
    }
    .btn-view-product {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      background: rgba(30,144,255,0.1);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-view-product:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Selection bar ── */
    .selection-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #1570c9, var(--accent2));
      color: #fff;
      padding: 14px 24px;
      border-radius: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 50;
      white-space: nowrap;
    }
    .selection-bar.visible { transform: translateX(-50%) translateY(0); }
    .selection-bar .sel-name {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }
    .selection-bar .btn-clear {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .selection-bar .btn-clear:hover { background: rgba(255,255,255,0.35); }

    @media (max-width: 600px) {
      .modal-body { flex-direction: column; }
      .modal-img-wrap { width: 80px; height: 80px; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Price Quote</h1>
    <p>Search Amazon and get the best product pricing instantly</p>
  </div>

  <div class="card">
    <form id="quoteForm">
      <div class="form-row">
        <div class="form-group">
          <label for="item">Item</label>
          <input type="text" id="item" placeholder="e.g. iPhone 14" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label for="brand">Brand <span style="color:var(--muted);font-weight:300">(optional)</span></label>
          <input type="text" id="brand" placeholder="e.g. Apple" autocomplete="off"/>
        </div>
      </div>
      <button type="submit" class="btn-search" id="searchBtn">
        <span id="btnLabel">Check Price</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="results-header">
      <span class="results-title">Top Results</span>
      <span class="results-count" id="resultsCount">0 products</span>
    </div>
    <div class="table-wrap">
      <table id="resultsTable">
        <thead>
          <tr>
            <th class="thumb-cell"></th>
            <th>Product</th>
            <th>Rating</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <div class="modal-header">
        <span class="modal-header-title">Product Details</span>
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-img-wrap" id="modalImg">📦</div>
        <div class="modal-info">
          <div class="modal-product-name" id="modalName"></div>
          <div class="detail-grid" id="modalGrid"></div>
        </div>
      </div>
      <div id="modalDelivery"></div>
      <div class="modal-footer">
        <a class="btn-view-product" id="modalLink" href="#" target="_blank" rel="noopener">
          ↗ View on Amazon
        </a>
      </div>
    </div>
  </div>

  <!-- Selection bar -->
  <div class="selection-bar" id="selectionBar">
    <span>Selected:</span>
    <span class="sel-name" id="selName"></span>
    <button class="btn-clear" id="clearSelection">Clear</button>
  </div>

<script>
  const MARKUP = 1.5; // 50% markup

  const applyMarkup = price =>
    (price !== null && price !== undefined && !isNaN(price))
      ? (price * MARKUP).toFixed(2)
      : null;

  const stars = rating => {
    if (!rating) return '—';
    const full = Math.round(rating);
    return '★'.repeat(full) + '☆'.repeat(Math.max(0, 5 - full)) + ` ${rating}`;
  };

  let selectedProduct = null;
  let products = [];

  const form       = document.getElementById('quoteForm');
  const searchBtn  = document.getElementById('searchBtn');
  const spinner    = document.getElementById('spinner');
  const btnLabel   = document.getElementById('btnLabel');
  const statusMsg  = document.getElementById('statusMsg');
  const section    = document.getElementById('resultsSection');
  const tbody      = document.getElementById('resultsBody');
  const countEl    = document.getElementById('resultsCount');
  const backdrop   = document.getElementById('modalBackdrop');
  const modalClose = document.getElementById('modalClose');
  const selBar     = document.getElementById('selectionBar');
  const selName    = document.getElementById('selName');
  const clearBtn   = document.getElementById('clearSelection');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const item  = document.getElementById('item').value.trim();
    const brand = document.getElementById('brand').value.trim();

    if (!item) {
      showStatus('Please enter an item name.', true);
      return;
    }

    setLoading(true);
    showStatus('Searching Amazon...');
    clearResults();

    try {
      const res = await fetch('https://conferential-heide-fuggily.ngrok-free.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item, brand })
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      products = Array.isArray(data) ? data : [];
      renderResults(products);
      showStatus('');
    } catch (err) {
      showStatus('Failed to fetch results. Check your connection.', true);
    } finally {
      setLoading(false);
    }
  });

  function setLoading(on) {
    searchBtn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    btnLabel.textContent = on ? 'Searching…' : 'Check Price';
  }

  function showStatus(msg, isError = false) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg' + (isError ? ' error' : '');
  }

  function clearResults() {
    tbody.innerHTML = '';
    section.style.display = 'none';
    selectedProduct = null;
    selBar.classList.remove('visible');
  }

  function renderResults(list) {
    if (!list.length) {
      tbody.innerHTML = `
        <tr><td colspan="4">
          <div class="empty-state">
            <div class="icon">🔍</div>
            <p>No products found. Try a different search.</p>
          </div>
        </td></tr>`;
      countEl.textContent = '0 products';
      section.style.display = 'block';
      return;
    }

    countEl.textContent = `${list.length} product${list.length !== 1 ? 's' : ''}`;
    tbody.innerHTML = '';

    list.forEach((p, i) => {
      const markedUp = applyMarkup(p.price);
      const tr = document.createElement('tr');
      tr.dataset.index = i;

      tr.innerHTML = `
        <td class="thumb-cell">
          <div class="thumb-wrap">
            ${p.image_url
              ? `<img src="${esc(p.image_url)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<span class=thumb-fallback>📦</span>'">`
              : `<span class="thumb-fallback">📦</span>`}
          </div>
        </td>
        <td>
          <div class="product-name">${esc(p.name || 'Unknown Product')}</div>
          ${p.brand ? `<div class="product-brand">${esc(p.brand)}</div>` : ''}
        </td>
        <td>
          ${p.rating
            ? `<span class="stars">${stars(p.rating)}</span>`
            : `<span style="color:var(--muted);font-size:13px">—</span>`}
        </td>
        <td class="price-cell">
          ${markedUp !== null
            ? `$${markedUp}`
            : `<span class="price-null">N/A</span>`}
        </td>
      `;

      tr.addEventListener('click', () => {
        openModal(i);
        selectRow(tr, i);
      });

      tbody.appendChild(tr);
    });

    section.style.display = 'block';
  }

  function selectRow(tr, index) {
    document.querySelectorAll('#resultsBody tr').forEach(r => r.classList.remove('selected'));
    tr.classList.add('selected');
    selectedProduct = products[index];
    selName.textContent = selectedProduct.name || 'Product';
    selBar.classList.add('visible');
  }

  clearBtn.addEventListener('click', () => {
    document.querySelectorAll('#resultsBody tr').forEach(r => r.classList.remove('selected'));
    selectedProduct = null;
    selBar.classList.remove('visible');
  });

  function openModal(index) {
    const p = products[index];
    const markedUp = applyMarkup(p.price);

    // Image
    const modalImgEl = document.getElementById('modalImg');
    if (p.image_url) {
      modalImgEl.innerHTML = `<img src="${esc(p.image_url)}" alt="" onerror="this.parentElement.innerHTML='📦'">`;
    } else {
      modalImgEl.innerHTML = '📦';
    }

    document.getElementById('modalName').textContent = p.name || 'Unknown Product';

    // Grid
    const grid = document.getElementById('modalGrid');
    const details = [
      { label: 'Price', value: markedUp !== null ? `$${markedUp}` : 'N/A', cls: markedUp ? 'price-highlight' : '' },
      { label: 'Brand',  value: p.brand || '—' },
      { label: 'Rating', value: p.rating ? `${stars(p.rating)}` : '—', raw: true },
      { label: 'Reviews', value: p.review_count ? p.review_count.toLocaleString() : '—' },
      { label: 'Sponsored', value: p.sponsored ? '⚡ Yes' : 'No', cls: p.sponsored ? 'sponsored-badge' : '' },
    ];

    grid.innerHTML = details.map(d => `
      <div class="detail-item">
        <span class="detail-label">${d.label}</span>
        <span class="detail-value ${d.cls || ''}">${d.raw ? `<span class="stars">${d.value}</span>` : esc(String(d.value))}</span>
      </div>
    `).join('');

    // Delivery
    const delivEl = document.getElementById('modalDelivery');
    if (p.delivery_info && p.delivery_info.length) {
      delivEl.innerHTML = `
        <div class="modal-delivery" style="margin:0 24px 8px">
          <span class="detail-label">Delivery</span>
          <ul>${p.delivery_info.map(d => `<li>${esc(d)}</li>`).join('')}</ul>
        </div>`;
    } else {
      delivEl.innerHTML = '';
    }

    // Link
    const link = document.getElementById('modalLink');
    if (p.source_url) {
      link.href = p.source_url;
      link.style.pointerEvents = '';
      link.style.opacity = '';
    } else {
      link.href = '#';
      link.style.pointerEvents = 'none';
      link.style.opacity = '0.4';
    }

    backdrop.classList.add('open');
  }

  modalClose.addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function closeModal() {
    backdrop.classList.remove('open');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }
</script>
</body>
</html>
